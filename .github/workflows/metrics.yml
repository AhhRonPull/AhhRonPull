name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AhhRonPull
          filename: github-metrics.svg
          template: classic
          base: activity, community, repositories

          # ✅ Count commits across all repos including private
          repositories_forks: yes

          # ✅ Disable Recent Activity (fixes "Unexpected error")
          plugin_activity: no

          # ✅ Keep the good stuff
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ✅ Count contributions from private commits
          plugin_commits: yes
          plugin_commits_authoring: AhhRonPull, aaronvillanueva304@gmail.com
